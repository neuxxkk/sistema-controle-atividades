# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
# defaults to the current working directory.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# leave blank for local time
# timezone =

# max characters of rev {id} to use when generating a slug
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc files to be created
# sourceless = false

# version location specification; this defaults
# to alembic/versions.  When using multiple version
# directories, separate with spaces.
# version_locations = %(here)s/bar/versions %(here)s/bat/versions

# version path separator; as above, this can be the default
# (os.pathsep, or ';' on Windows, ':' on POSIX), or a custom symbol,
# or "space" (one or more spaces).
# version_path_separator = :

# set to 'true' to search for scripts recursively
# recursive_version_locations = false

# the output encoding used when writing to the stdout or to the file
# output_encoding = utf-8

sqlalchemy.url = postgresql+asyncpg://formula:formula_password@db:5432/formula_db


[post_write_hooks]
# post_write_hooks allows scripts to be ran after generating a revision file
# as part of the "revision" command.

# format using "black"
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
